name = "memory"
description = "Open Brain (OB1) shared memory server for semantic recall across AI clients."
command = "npx"
args = ["-y", "supergateway", "--streamableHttp", "{{OPEN_BRAIN_MCP_URL}}"]
requires_config = ["OPEN_BRAIN_MCP_URL"]
requires_env = ["OPEN_BRAIN_MCP_URL"]
extra_permissions = ["mcp__open_brain__*"]
settings_target = "settings.json"

[[triggers]]
kind = "always"
value = "true"
