name: memory
description: >
  Open Brain (OB1) shared memory via MCP.
  Backs memory_store and metadata_query tool aliases for Coobie while keeping
  recall available across Claude, ChatGPT, Codex, Cursor, and Twilight-connected
  agents.
command: npx
args:
  - "-y"
  - "supergateway"
  - "--streamableHttp"
  - "${OPEN_BRAIN_MCP_URL}"
tool_aliases:
  - memory_store
  - metadata_query
platforms:
  - linux
  - windows
  - darwin
notes: >
  Requires Node.js and OPEN_BRAIN_MCP_URL set to the OB1 MCP connection URL.
  OB1 stores thoughts in its shared database with vector search, so Harkonnen
  no longer needs the ORT-backed local fastembed path by default.
